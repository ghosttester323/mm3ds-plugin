name: Build MM3DS Plugin

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: devkitpro/devkitarm:latest

    steps:
    - name: Install build tools
      run: |
        apt-get update
        apt-get install -y git zip
        
        # Install 3gxtool
        git clone https://github.com/Nanquitas/3gxtool.git
        cd 3gxtool
        gcc 3gxtool.c -o 3gxtool
        cp 3gxtool /usr/local/bin/
        cd ..

    - name: Clone working CTRPF plugin
      run: |
        # Clone a working plugin as base
        git clone --recursive https://github.com/mortenson/jisho-3gx.git
        cd jisho-3gx
        ls -la
        
        # Check if there's a lib folder
        ls -la lib/ 2>/dev/null || echo "No lib folder"
        
        # Check the include structure
        ls -la include/ 2>/dev/null || echo "No include folder"

    - name: Show repo structure
      run: |
        cd jisho-3gx
        find . -name "*.yml" -o -name "Makefile" -o -name "*.mk"
        cat Makefile 2>/dev/null || echo "No Makefile"
        
    - name: Build the original plugin first
      run: |
        cd jisho-3gx
        export DEVKITPRO=/opt/devkitpro
        export DEVKITARM=/opt/devkitpro/devkitARM
        make clean
        make 2>&1 || echo "Build attempt done"
        ls -la *.3gx 2>/dev/null || echo "No 3gx yet"
        find . -name "*.3gx"

    - name: Check if build succeeded
      run: |
        cd jisho-3gx
        if [ -f "*.3gx" ]; then
          echo "SUCCESS: 3gx file built!"
          cp *.3gx ../MM3DSSearch.3gx
        else
          found=$(find . -name "*.3gx" | head -1)
          if [ -n "$found" ]; then
            echo "SUCCESS: Found 3gx at $found"
            cp "$found" ../MM3DSSearch.3gx
          else
            echo "Build failed - checking what we have"
            find . -name "*.elf"
            find . -name "*.a"
          fi
        fi

    - name: Prepare output
      run: |
        mkdir -p output
        
        if [ -f MM3DSSearch.3gx ]; then
          cp MM3DSSearch.3gx output/
          echo "Plugin built successfully!"
        else
          # If build failed, create instructions
          echo "Build Status: In Progress" > output/STATUS.txt
          echo "" >> output/STATUS.txt
          echo "The plugin requires additional setup." >> output/STATUS.txt
          echo "Please check the Actions log for details." >> output/STATUS.txt
        fi
        
        # Always create README
        cat > output/README.txt << 'EOF'
        MM3DS Level Search Plugin
        =========================
        
        INSTALLATION:
        1. Place MM3DSSearch.3gx on your SD card:
           EUR: /luma/plugins/0004000000165800/
           USA: /luma/plugins/0004000000164800/
        
        2. Enable plugins in Luma3DS (hold SELECT on boot)
        
        3. Launch Mario Maker 3DS
        4. Press SELECT in-game to open menu
        EOF

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: MM3DSSearch-plugin
        path: output/
