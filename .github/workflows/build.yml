name: Build MM3DS Plugin

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: devkitpro/devkitarm:latest

    steps:
    - name: Install tools
      run: |
        apt-get update && apt-get install -y git zip wget

    - name: Download 3gxtool
      run: |
        wget -q https://github.com/Nanquitas/3gxtool/releases/download/v2.0/3gxtool-linux-x86_64 -O /usr/local/bin/3gxtool || \
        wget -q https://github.com/Nanquitas/3gxtool/releases/download/v1.0/3gxtool-linux -O /usr/local/bin/3gxtool
        chmod +x /usr/local/bin/3gxtool

    - name: Clone CTRPF base
      run: |
        git clone --recursive https://github.com/mortenson/jisho-3gx.git
        cd jisho-3gx
        git submodule update --init --recursive

    - name: Create MM3DS plugin with REAL HTTP API
      run: |
        cd jisho-3gx
        
        cat > source/main.cpp << 'EOFMAIN'
        #include <CTRPluginFramework.hpp>
        #include <string>
        #include <vector>
        #include <cstring>
        #include <cstdlib>
        #include <3ds.h>

        using namespace CTRPluginFramework;

        // ============================================
        // MM3DS LEVEL SEARCH - REAL HTTP API VERSION
        // Uses 3DS httpc library for network requests
        // ============================================

        namespace {
            std::vector<std::string> g_searchResults;
            bool g_networkReady = false;
            u32 g_socBuffer[0x100000/4];
        }

        // Level data structure
        struct LevelInfo {
            std::string id;
            std::string name;
            std::string owner;
            int stars;
            int clears;
        };

        std::vector<LevelInfo> g_foundLevels;

        // ============================================
        // NETWORK FUNCTIONS (using 3DS httpc)
        // ============================================

        // Initialize network (SOC + httpc)
        bool InitNetwork() {
            if (g_networkReady) return true;
            
            Result ret = socInit(g_socBuffer, sizeof(g_socBuffer));
            if (R_FAILED(ret)) {
                OSD::Notify(Color::Red << "SOC init failed: " << (int)ret);
                return false;
            }
            
            ret = httpcInit(0);
            if (R_FAILED(ret)) {
                OSD::Notify(Color::Red << "HTTP init failed: " << (int)ret);
                socExit();
                return false;
            }
            
            g_networkReady = true;
            OSD::Notify(Color::Green << "Network ready!");
            return true;
        }

        // URL encode
        std::string URLEncode(const std::string& s) {
            std::string out;
            char hex[4];
            for (unsigned char c : s) {
                if (isalnum(c) || c == '-' || c == '_' || c == '.' || c == '~') {
                    out += c;
                } else {
                    sprintf(hex, "%%%02X", c);
                    out += hex;
                }
            }
            return out;
        }

        // HTTP GET request
        std::string HTTPGet(const char* url) {
            httpcContext context;
            Result ret = httpcOpenContext(&context, HTTPC_METHOD_GET, url, 0);
            
            if (R_FAILED(ret)) {
                OSD::Notify(Color::Red << "HTTP open failed");
                return "";
            }
            
            httpcSetSSLOpt(&context, HTTPCOPT_DISABLE_SSLVERIFY);
            httpcAddRequestHeaderField(&context, "User-Agent", "MM3DS-Plugin/1.0");
            httpcAddRequestHeaderField(&context, "Accept", "application/json");
            
            ret = httpcBeginRequest(&context);
            if (R_FAILED(ret)) {
                httpcCloseContext(&context);
                OSD::Notify(Color::Red << "HTTP request failed");
                return "";
            }
            
            u32 status = 0;
            httpcGetResponseStatusCode(&context, &status);
            
            if (status != 200) {
                httpcCloseContext(&context);
                OSD::Notify(Color::Red << "HTTP status: " << (int)status);
                return "";
            }
            
            // Read response
            std::string response;
            u8 buffer[4096];
            u32 readSize = 0;
            
            do {
                ret = httpcDownloadData(&context, buffer, sizeof(buffer), &readSize);
                if (readSize > 0) {
                    response.append((char*)buffer, readSize);
                }
            } while (ret == (Result)HTTPC_RESULTCODE_DOWNLOADPENDING);
            
            httpcCloseContext(&context);
            return response;
        }

        // Simple JSON parser
        std::string ExtractJSONString(const std::string& json, const std::string& key) {
            std::string search = "\"" + key + "\":\"";
            size_t pos = json.find(search);
            if (pos == std::string::npos) return "";
            
            pos += search.length();
            size_t end = json.find('"', pos);
            if (end == std::string::npos) return "";
            
            return json.substr(pos, end - pos);
        }

        int ExtractJSONInt(const std::string& json, const std::string& key) {
            std::string search = "\"" + key + "\":";
            size_t pos = json.find(search);
            if (pos == std::string::npos) return 0;
            
            pos += search.length();
            while (pos < json.size() && (json[pos] == ' ' || json[pos] == '\t')) pos++;
            
            std::string num;
            while (pos < json.size() && isdigit(json[pos])) {
                num += json[pos];
                pos++;
            }
            return num.empty() ? 0 : atoi(num.c_str());
        }

        // Parse courses from JSON
        void ParseCourses(const std::string& json) {
            g_foundLevels.clear();
            
            size_t pos = 0;
            while ((pos = json.find("\"courseid\"", pos)) != std::string::npos) {
                size_t objStart = json.rfind('{', pos);
                size_t objEnd = json.find("},", pos);
                if (objEnd == std::string::npos) objEnd = json.find('}', pos);
                if (objStart == std::string::npos || objEnd == std::string::npos) break;
                
                std::string obj = json.substr(objStart, objEnd - objStart + 1);
                
                LevelInfo level;
                level.id = ExtractJSONString(obj, "courseid");
                level.name = ExtractJSONString(obj, "title");
                level.owner = ExtractJSONString(obj, "owner");
                level.stars = ExtractJSONInt(obj, "stars");
                level.clears = ExtractJSONInt(obj, "clears");
                
                if (!level.name.empty() && !level.id.empty()) {
                    g_foundLevels.push_back(level);
                }
                pos = objEnd + 1;
            }
        }

        // Search levels
        bool SearchLevels(const std::string& query) {
            if (!g_networkReady) {
                if (!InitNetwork()) return false;
            }
            
            g_foundLevels.clear();
            
            std::string url = "https://smmdb.net/api/getcourses";
            if (!query.empty()) {
                url += "?title=" + URLEncode(query);
            }
            
            OSD::Notify(Color::Yellow << "Searching...");
            
            std::string response = HTTPGet(url.c_str());
            
            if (response.empty()) {
                OSD::Notify(Color::Red << "No response");
                return false;
            }
            
            ParseCourses(response);
            
            OSD::Notify(Color::Green << "Found: " << g_foundLevels.size() << " levels");
            return !g_foundLevels.empty();
        }

        // ============================================
        // MENU CALLBACKS
        // ============================================

        void MenuSearchName(MenuEntry*) {
            Keyboard kb;
            kb.SetHeaderText("Enter level name:");
            std::string input;
            if (kb.Open(input) == 0 && !input.empty()) {
                if (SearchLevels(input)) {
                    OSD::Notify("Use 'View Results'");
                }
            }
        }

        void MenuSearchAuthor(MenuEntry*) {
            Keyboard kb;
            kb.SetHeaderText("Enter author name:");
            std::string input;
            if (kb.Open(input) == 0 && !input.empty()) {
                if (!g_networkReady && !InitNetwork()) return;
                
                std::string url = "https://smmdb.net/api/getcourses?owner=" + URLEncode(input);
                OSD::Notify(Color::Yellow << "Searching...");
                std::string resp = HTTPGet(url.c_str());
                if (!resp.empty()) {
                    ParseCourses(resp);
                    OSD::Notify(Color::Green << "Found: " << g_foundLevels.size());
                }
            }
        }

        void MenuViewResults(MenuEntry*) {
            if (g_foundLevels.empty()) {
                MessageBox("No results!\n\nSearch first.")();
                return;
            }
            
            std::vector<std::string> items;
            for (auto& l : g_foundLevels) {
                std::string s = l.name.substr(0, 25);
                s += " [" + std::to_string(l.stars) + "\u2605]";
                items.push_back(s);
            }
            
            Keyboard kb;
            kb.SetHeaderText("Select level:");
            kb.Populate(items);
            int sel = kb.Open();
            
            if (sel >= 0 && sel < (int)g_foundLevels.size()) {
                LevelInfo& lv = g_foundLevels[sel];
                std::string info = lv.name + "\n\n";
                info += "By: " + lv.owner + "\n";
                info += "ID: " + lv.id + "\n";
                info += "Stars: " + std::to_string(lv.stars) + "\n";
                info += "Clears: " + std::to_string(lv.clears);
                
                MessageBox box(info);
                box.AddButton("OK");
                box();
            }
        }

        void MenuRecent(MenuEntry*) {
            SearchLevels("");
        }

        void MenuTestNet(MenuEntry*) {
            OSD::Notify(Color::Yellow << "Testing connection...");
            if (!InitNetwork()) return;
            
            std::string r = HTTPGet("https://smmdb.net/api/getcourses?limit=1");
            if (!r.empty()) {
                OSD::Notify(Color::Green << "SMMDB OK!");
            } else {
                OSD::Notify(Color::Red << "Connection failed");
            }
        }

        void MenuAbout(MenuEntry*) {
            MessageBox(
                "MM3DS Level Search v1.0\n\n"
                "REAL API VERSION!\n\n"
                "Connects to SMMDB:\n"
                "smmdb.net/api\n\n"
                "Features:\n"
                "- Search by name\n"
                "- Search by author\n"
                "- View results\n\n"
                "Requires WiFi!\n"
                "Works with Pretendo!\n\n"
                "SELECT = open/close menu"
            )();
        }

        void OnInit(MenuEntry*) {
            OSD::Notify(Color::Green << "MM3DS Search loaded!");
            OSD::Notify("Press SELECT for menu");
        }

        int main() {
            PluginMenu menu("MM3DS Level Search", 1, 0, 0);
            menu.SynchronizeWithFrame(true);
            
            menu.Append(new MenuEntry("Search by Name", MenuSearchName, "Search levels"));
            menu.Append(new MenuEntry("Search by Author", MenuSearchAuthor, "Find by creator"));
            menu.Append(new MenuEntry("View Results", MenuViewResults, "View found levels"));
            menu.Append(new MenuEntry("Recent Levels", MenuRecent, "Browse recent"));
            menu.Append(new MenuEntry("Test Connection", MenuTestNet, "Test WiFi"));
            menu.Append(new MenuEntry("About", MenuAbout));
            
            menu.OnInitialize = OnInit;
            menu.Run();
            return 0;
        }
        EOFMAIN

    - name: Build plugin
      run: |
        cd jisho-3gx
        export DEVKITPRO=/opt/devkitpro
        export DEVKITARM=/opt/devkitpro/devkitARM
        make clean 2>/dev/null || true
        make 2>&1 | tail -30

    - name: Check result
      run: |
        cd jisho-3gx
        ls -la *.3gx 2>/dev/null || find . -name "*.3gx"

    - name: Prepare output
      run: |
        mkdir -p output
        cd jisho-3gx
        found=$(find . -name "*.3gx" | head -1)
        if [ -n "$found" ]; then
          cp "$found" ../output/MM3DSSearch.3gx
          echo "BUILD SUCCESS!"
        fi
        
        cat > ../output/README.txt << 'EOF'
        ╔══════════════════════════════════════════════╗
        ║   MM3DS LEVEL SEARCH v1.0 - REAL API         ║
        ╚══════════════════════════════════════════════╝
        
        ✅ VRAIE API SMMDB!
        
        INSTALLATION:
        ─────────────
        EUR: /luma/plugins/0004000000165800/
        USA: /luma/plugins/0004000000164800/
        JPN: /luma/plugins/0004000000164400/
        
        1. Active plugins dans Luma3DS (SELECT au boot)
        2. Lance Mario Maker 3DS
        3. SELECT pour ouvrir le menu
        
        FONCTIONS:
        ──────────
        • Search by Name - Cherche par nom
        • Search by Author - Par créateur
        • View Results - Voir les résultats
        • Test Connection - Test WiFi
        
        REQUIERT:
        ─────────
        ✓ Connexion WiFi active
        ✓ Pretendo Network (optionnel)
        
        API: smmdb.net/api
        EOF

    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: MM3DSSearch-Real-API
        path: output/
