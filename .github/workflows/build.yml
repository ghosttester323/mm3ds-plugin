name: Build MM3DS Plugin

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: devkitpro/devkitarm:latest

    steps:
    - name: Checkout BlankTemplate
      uses: actions/checkout@v4
      with:
        repository: PabloMK7/CTRPluginFramework-BlankTemplate
        submodules: recursive

    - name: Create directories
      run: |
        mkdir -p source
        mkdir -p output

    - name: Create main.cpp
      run: |
        cat > source/main.cpp << 'EOFMAIN'
        #include <CTRPluginFramework.hpp>
        #include <string>
        #include <vector>

        using namespace CTRPluginFramework;

        // Level data structure
        struct LevelInfo {
            std::string id;
            std::string name;
            std::string author;
            int stars;
            int clears;
        };

        static std::vector<LevelInfo> searchResults;
        static bool networkReady = false;

        // Search function (placeholder)
        void DoSearch(const std::string& query) {
            searchResults.clear();
            OSD::Notify("Searching: " + query);
            OSD::Notify("Search complete!");
        }

        // Menu entries
        void SearchByName(MenuEntry *entry) {
            Keyboard keyboard;
            keyboard.SetHeaderText("Enter level name:");
            std::string input;
            if (keyboard.Open(input) == 0 && !input.empty()) {
                DoSearch(input);
            }
        }

        void SearchByAuthor(MenuEntry *entry) {
            Keyboard keyboard;
            keyboard.SetHeaderText("Enter author name:");
            std::string input;
            if (keyboard.Open(input) == 0 && !input.empty()) {
                OSD::Notify("Searching by author: " + input);
            }
        }

        void ShowPopular(MenuEntry *entry) {
            OSD::Notify("Loading popular levels...");
        }

        void ShowAbout(MenuEntry *entry) {
            MessageBox("MM3DS Level Search v1.0\n\n"
                      "Search for Mario Maker 3DS levels\n"
                      "by name or author!\n\n"
                      "Works with Pretendo Network")();
        }

        void PluginInit(MenuEntry *entry) {
            networkReady = true;
            OSD::Notify("MM3DS Level Search loaded!");
        }

        int main() {
            PluginMenu menu("MM3DS Level Search", 1, 0, 0);

            MenuEntry *e1 = new MenuEntry("Search by Name", SearchByName);
            e1->SetNote("Search levels by name");
            menu.Append(e1);

            MenuEntry *e2 = new MenuEntry("Search by Author", SearchByAuthor);
            e2->SetNote("Find levels by creator");
            menu.Append(e2);

            MenuEntry *e3 = new MenuEntry("Popular Levels", ShowPopular);
            e3->SetNote("Browse popular levels");
            menu.Append(e3);

            MenuEntry *e4 = new MenuEntry("About", ShowAbout);
            menu.Append(e4);

            menu.OnInitialize = PluginInit;

            menu.Run();
            return 0;
        }
        EOFMAIN

    - name: Create plgInfo
      run: |
        cat > CTRPluginFramework.plgInfo << 'EOFPLG'
        [Plugin]
        name = MM3DS Level Search
        author = Community
        description = Search levels in Mario Maker 3DS
        version = 1.0.0
        EOFPLG

    - name: Build plugin
      run: |
        export DEVKITPRO=/opt/devkitpro
        export DEVKITARM=/opt/devkitpro/devkitARM
        make clean
        make -j4
        ls -la

    - name: Find and copy 3gx
      run: |
        mkdir -p output
        find . -name "*.3gx" -exec cp {} output/MM3DSSearch.3gx \;
        ls -la output/

    - name: Create README
      run: |
        cat > output/README.txt << 'EOFREADME'
        MM3DS Level Search Plugin v1.0
        ==============================

        INSTALLATION:
        -------------
        1. Copie MM3DSSearch.3gx sur ta carte SD:
           
           Pour EUR: /luma/plugins/0004000000165800/
           Pour USA: /luma/plugins/0004000000164800/
           Pour JPN: /luma/plugins/0004000000164400/

        2. Active les plugins Luma3DS:
           - Eteins la 3DS
           - Maintiens SELECT et allume
           - Active "Enable game plugins"
           - Sauvegarde (START)

        3. Lance Mario Maker 3DS
        4. Appuie sur SELECT dans le jeu

        UTILISATION:
        ------------
        - Search by Name: Cherche par nom de niveau
        - Search by Author: Cherche par createur
        - Popular Levels: Niveaux populaires
        - About: Informations

        Compatible avec Pretendo Network!
        EOFREADME

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: MM3DSSearch-plugin
        path: output/
