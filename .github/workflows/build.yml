name: Build MM3DS Plugin

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: devkitpro/devkitarm:latest

    steps:
    - name: Checkout BlankTemplate
      uses: actions/checkout@v4
      with:
        repository: PabloMK7/CTRPluginFramework-BlankTemplate
        submodules: recursive
        fetch-depth: 0

    - name: Debug - Show structure
      run: |
        echo "=== Current directory ==="
        pwd
        echo "=== Files ==="
        ls -la
        echo "=== Subdirectories ==="
        find . -type d -maxdepth 2
        echo "=== Looking for headers ==="
        find . -name "*.hpp" | head -20
        echo "=== Looking for makefiles ==="
        find . -name "Makefile" -o -name "makefile"

    - name: Create main plugin code
      run: |
        # Backup original and create new main
        mv Sources/main.cpp Sources/main.cpp.bak
        
        cat > Sources/main.cpp << 'EOFMAIN'
        #include <CTRPluginFramework.hpp>
        #include <string>
        #include <vector>

        using namespace CTRPluginFramework;

        static bool networkReady = false;

        void SearchByName(MenuEntry *entry) {
            Keyboard keyboard;
            keyboard.SetHeaderText("Enter level name:");
            std::string input;
            if (keyboard.Open(input) == 0 && !input.empty()) {
                OSD::Notify("Searching: " + input);
                OSD::Notify("Feature coming soon!");
            }
        }

        void SearchByAuthor(MenuEntry *entry) {
            Keyboard keyboard;
            keyboard.SetHeaderText("Enter author name:");
            std::string input;
            if (keyboard.Open(input) == 0 && !input.empty()) {
                OSD::Notify("Author search: " + input);
            }
        }

        void ShowPopular(MenuEntry *entry) {
            OSD::Notify("Loading popular levels...");
        }

        void ShowAbout(MenuEntry *entry) {
            MessageBox("MM3DS Level Search v1.0\n\n"
                      "Search Mario Maker 3DS levels\n"
                      "by name or author!\n\n"
                      "Works with Pretendo Network")();
        }

        void PluginInit(MenuEntry *entry) {
            networkReady = true;
            OSD::Notify("MM3DS Level Search loaded!");
        }

        int main() {
            PluginMenu menu("MM3DS Level Search", 1, 0, 0);

            menu.Append(new MenuEntry("Search by Name", SearchByName, "Search by level name"));
            menu.Append(new MenuEntry("Search by Author", SearchByAuthor, "Find levels by creator"));
            menu.Append(new MenuEntry("Popular Levels", ShowPopular, "Browse popular levels"));
            menu.Append(new MenuEntry("About", ShowAbout));

            menu.OnInitialize = PluginInit;
            menu.Run();
            return 0;
        }
        EOFMAIN

    - name: Update plugin info
      run: |
        cat > CTRPluginFramework.plgInfo << 'EOFPLG'
        [Plugin]
        name = MM3DS Level Search
        author = Community
        description = Search levels in Mario Maker 3DS
        version = 1.0.0
        EOFPLG

    - name: Build
      run: |
        export DEVKITPRO=/opt/devkitpro
        export DEVKITARM=/opt/devkitpro/devkitARM
        make clean
        make -j4

    - name: Find output
      run: |
        echo "=== Looking for 3gx files ==="
        find . -name "*.3gx"
        echo "=== Looking for elf files ==="
        find . -name "*.elf"
        echo "=== All files in current dir ==="
        ls -la

    - name: Prepare artifact
      run: |
        mkdir -p output
        # Find and copy 3gx
        if [ -f "*.3gx" ]; then
          cp *.3gx output/MM3DSSearch.3gx
        else
          found=$(find . -name "*.3gx" | head -1)
          if [ -n "$found" ]; then
            cp "$found" output/MM3DSSearch.3gx
          fi
        fi
        
        # Create README
        cat > output/README.txt << 'EOFREADME'
        MM3DS Level Search Plugin v1.0
        ==============================
        
        INSTALLATION:
        1. Copie MM3DSSearch.3gx sur ta SD:
           EUR: /luma/plugins/0004000000165800/
           USA: /luma/plugins/0004000000164800/
           JPN: /luma/plugins/0004000000164400/
        
        2. Active "Enable game plugins" dans Luma3DS
           (Maintiens SELECT au demarrage)
        
        3. Lance Mario Maker 3DS
        4. Appuie sur SELECT dans le jeu
        
        Compatible Pretendo Network!
        EOFREADME
        
        ls -la output/

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: MM3DSSearch-plugin
        path: output/
