name: Build MM3DS Plugin

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: devkitpro/devkitarm:latest

    steps:
    - name: Install tools
      run: apt-get update && apt-get install -y zip curl unzip

    - name: Download CTRPluginFramework
      run: |
        curl -L "https://github.com/Nanquitas/CTRPluginFramework/archive/refs/heads/master.zip" -o ctrpf.zip
        unzip -q ctrpf.zip
        mv CTRPluginFramework-master CTRPluginFramework
        ls -la

    - name: Download jisho-3gx
      run: |
        curl -L "https://github.com/mortenson/jisho-3gx/archive/refs/heads/master.zip" -o jisho.zip
        unzip -q jisho.zip
        mv jisho-3gx-master jisho-3gx
        ls -la

    - name: Setup includes
      run: |
        cd jisho-3gx
        mkdir -p include
        cp -r ../CTRPluginFramework/include/* include/
        ls -la include/
        ls -la include/CTRPluginFramework/ | head -10

    - name: Create plugin code
      run: |
        cd jisho-3gx
        
        cat > Sources/main.cpp << 'EOF'
        #include "../include/CTRPluginFramework.hpp"
        #include <string>
        #include <vector>
        #include <3ds.h>

        using namespace CTRPluginFramework;

        bool g_netOk = false;
        u32* g_socBuf = nullptr;
        std::vector<std::string> g_results;

        bool InitNet() {
            if (g_netOk) return true;
            g_socBuf = (u32*)memalign(0x1000, 0x100000);
            if (!g_socBuf) return false;
            if (R_FAILED(socInit(g_socBuf, 0x100000))) return false;
            if (R_FAILED(httpcInit(0))) { socExit(); return false; }
            g_netOk = true;
            OSD::Notify(Color::Green << "Network OK!");
            return true;
        }

        std::string UrlEnc(const std::string& s) {
            std::string o; char h[8];
            for (unsigned char c : s) {
                if (isalnum(c)||c=='-'||c=='_'||c=='.'||c=='~') o+=c;
                else { sprintf(h,"%%%02X",c); o+=h; }
            }
            return o;
        }

        std::string HttpGet(const char* url) {
            httpcContext c;
            if (R_FAILED(httpcOpenContext(&c, HTTPC_METHOD_GET, url, 0))) return "";
            httpcSetSSLOpt(&c, HTTPCOPT_DISABLE_SSLVERIFY);
            httpcAddRequestHeaderField(&c, "User-Agent", "MM3DS/1.0");
            if (R_FAILED(httpcBeginRequest(&c))) { httpcCloseContext(&c); return ""; }
            u32 st=0; httpcGetResponseStatusCode(&c, &st);
            if (st!=200) { httpcCloseContext(&c); return ""; }
            std::string r; u8 b[2048]; u32 n; Result ret;
            do {
                ret = httpcDownloadData(&c, b, sizeof(b), &n);
                if (n>0) r.append((char*)b, n);
            } while (ret == (Result)HTTPC_RESULTCODE_DOWNLOADPENDING);
            httpcCloseContext(&c);
            return r;
        }

        void Search(const std::string& q) {
            if (!g_netOk && !InitNet()) return;
            std::string u = "https://smmdb.net/api/getcourses";
            if (!q.empty()) u += "?title=" + UrlEnc(q);
            OSD::Notify(Color::Yellow << "Searching...");
            std::string r = HttpGet(u.c_str());
            if (r.empty()) OSD::Notify(Color::Red << "Failed");
            else OSD::Notify(Color::Green << "Got: " << r.length() << " bytes");
        }

        void MSearch(MenuEntry*) {
            Keyboard k; k.SetHeaderText("Level name:");
            std::string i;
            if (k.Open(i)==0 && !i.empty()) Search(i);
        }

        void MTest(MenuEntry*) {
            if (!g_netOk && !InitNet()) return;
            OSD::Notify(Color::Yellow << "Testing...");
            std::string r = HttpGet("https://smmdb.net/api/getcourses?limit=1");
            if (!r.empty()) OSD::Notify(Color::Green << "OK!");
            else OSD::Notify(Color::Red << "Failed");
        }

        void MAbout(MenuEntry*) {
            MessageBox("MM3DS Level Search v1.0\n\nConnects to SMMDB API!\n\nsmmdb.net/api\n\nWiFi required!")();
        }

        void MInit(MenuEntry*) { OSD::Notify(Color::Green << "MM3DS loaded!"); }

        int main() {
            PluginMenu m("MM3DS Level Search", 1, 0, 0);
            m.Append(new MenuEntry("Search", MSearch));
            m.Append(new MenuEntry("Test Connection", MTest));
            m.Append(new MenuEntry("About", MAbout));
            m.OnInitialize = MInit;
            m.Run();
            return 0;
        }
        EOF

    - name: Fix includes in all files
      run: |
        cd jisho-3gx
        # Fix include paths
        sed -i 's|<CTRPluginFramework.hpp>|"../include/CTRPluginFramework.hpp"|g' Sources/*.cpp
        sed -i 's|<CTRPluginFramework.hpp>|"../include/CTRPluginFramework.hpp"|g' Includes/*.hpp 2>/dev/null || true
        sed -i 's|<CTRPluginFramework/|"../include/CTRPluginFramework/|g' Sources/*.cpp
        sed -i 's|<CTRPluginFramework/|"../include/CTRPluginFramework/|g' Includes/*.hpp 2>/dev/null || true

    - name: Build
      run: |
        cd jisho-3gx
        export DEVKITPRO=/opt/devkitpro
        export DEVKITARM=/opt/devkitpro/devkitARM
        make clean 2>/dev/null || true
        make 2>&1 | tail -30

    - name: Find outputs
      run: |
        cd jisho-3gx
        find . -name "*.3gx" -o -name "*.elf"

    - name: Prepare output
      run: |
        mkdir -p output
        cd jisho-3gx
        f=$(find . -name "*.3gx" | head -1)
        if [ -n "$f" ]; then
          cp "$f" ../output/MM3DSSearch.3gx
          echo "SUCCESS!"
        else
          echo "No 3gx found"
        fi
        echo "MM3DS Plugin" > ../output/README.txt

    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: MM3DSSearch
        path: output/
