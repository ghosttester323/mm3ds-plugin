name: Build MM3DS Plugin

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: devkitpro/devkitarm:latest

    steps:
    - name: Install tools
      run: apt-get update && apt-get install -y git zip curl

    - name: Clone CTRPluginFramework
      run: |
        git clone --depth=1 https://github.com/Nanquitas/CTRPluginFramework.git
        
    - name: Clone jisho-3gx
      run: |
        git clone --depth=1 https://github.com/mortenson/jisho-3gx.git
        
    - name: Link CTRPluginFramework into jisho-3gx
      run: |
        # Create lib directory in jisho-3gx
        mkdir -p jisho-3gx/lib/CTRPluginFramework
        
        # Copy CTRPluginFramework include files
        cp -r CTRPluginFramework/include jisho-3gx/lib/CTRPluginFramework/
        
        # Check structure
        ls -la jisho-3gx/lib/CTRPluginFramework/include/
        ls -la jisho-3gx/Includes/ 2>/dev/null || echo "No Includes dir"

    - name: Fix include paths in jisho-3gx
      run: |
        cd jisho-3gx
        
        # Find all hpp and cpp files and check their includes
        echo "=== Checking include structure ==="
        ls -la Includes/ 2>/dev/null || ls -la include/ 2>/dev/null || echo "Checking other locations"
        
        # Create symlink or copy includes
        mkdir -p include
        cp -r ../CTRPluginFramework/include/* include/
        
        echo "=== Include directory ==="
        ls -la include/
        ls -la include/CTRPluginFramework/ 2>/dev/null | head -10

    - name: Check Makefile
      run: |
        cd jisho-3gx
        cat Makefile | head -40

    - name: Create our plugin code
      run: |
        cd jisho-3gx
        
        # Find and replace main.cpp
        MAINFILE=$(find . -name "main.cpp" | head -1)
        echo "Main file: $MAINFILE"
        
        cat > "$MAINFILE" << 'EOFMAIN'
        #include <CTRPluginFramework.hpp>
        #include <string>
        #include <vector>
        #include <cstring>
        #include <cstdlib>
        #include <3ds.h>

        using namespace CTRPluginFramework;

        namespace {
            bool g_netOk = false;
            u32* g_socBuf = nullptr;
        }

        struct Level {
            std::string id, name, owner;
            int stars, clears;
        };

        std::vector<Level> g_levels;

        bool InitNet() {
            if (g_netOk) return true;
            g_socBuf = (u32*)memalign(0x1000, 0x100000);
            if (!g_socBuf) return false;
            if (R_FAILED(socInit(g_socBuf, 0x100000))) return false;
            if (R_FAILED(httpcInit(0))) { socExit(); return false; }
            g_netOk = true;
            OSD::Notify(Color::Green << "Network OK!");
            return true;
        }

        std::string UrlEnc(const std::string& s) {
            std::string o; char h[8];
            for (unsigned char c : s) {
                if (isalnum(c)||c=='-'||c=='_'||c=='.'||c=='~') o+=c;
                else { sprintf(h,"%%%02X",c); o+=h; }
            }
            return o;
        }

        std::string HttpGet(const char* url) {
            httpcContext c;
            if (R_FAILED(httpcOpenContext(&c, HTTPC_METHOD_GET, url, 0))) return "";
            httpcSetSSLOpt(&c, HTTPCOPT_DISABLE_SSLVERIFY);
            httpcAddRequestHeaderField(&c, "User-Agent", "MM3DS/1.0");
            if (R_FAILED(httpcBeginRequest(&c))) { httpcCloseContext(&c); return ""; }
            u32 st=0; httpcGetResponseStatusCode(&c, &st);
            if (st!=200) { httpcCloseContext(&c); return ""; }
            std::string r; u8 b[2048]; u32 n; Result ret;
            do {
                ret = httpcDownloadData(&c, b, sizeof(b), &n);
                if (n>0) r.append((char*)b, n);
            } while (ret == (Result)HTTPC_RESULTCODE_DOWNLOADPENDING);
            httpcCloseContext(&c);
            return r;
        }

        std::string GetStr(const std::string& j, const std::string& k) {
            std::string f = "\"" + k + "\":\"";
            size_t p = j.find(f);
            if (p==std::string::npos) return "";
            p += f.size();
            size_t e = j.find('"', p);
            return (e==std::string::npos) ? "" : j.substr(p, e-p);
        }

        int GetInt(const std::string& j, const std::string& k) {
            std::string f = "\"" + k + "\":";
            size_t p = j.find(f);
            if (p==std::string::npos) return 0;
            p += f.size();
            while (p<j.size() && (j[p]==' '||j[p]=='\t')) p++;
            std::string n;
            while (p<j.size() && isdigit(j[p])) n += j[p++];
            return n.empty() ? 0 : atoi(n.c_str());
        }

        void Parse(const std::string& j) {
            g_levels.clear();
            size_t p = 0;
            while ((p = j.find("\"courseid\"", p)) != std::string::npos) {
                size_t st = j.rfind('{', p);
                size_t en = j.find('}', p);
                if (st==std::string::npos || en==std::string::npos) break;
                std::string o = j.substr(st, en-st+1);
                Level lv;
                lv.id = GetStr(o, "courseid");
                lv.name = GetStr(o, "title");
                lv.owner = GetStr(o, "owner");
                lv.stars = GetInt(o, "stars");
                lv.clears = GetInt(o, "clears");
                if (!lv.name.empty() && !lv.id.empty()) g_levels.push_back(lv);
                p = en + 1;
            }
        }

        bool Search(const std::string& q) {
            if (!g_netOk && !InitNet()) return false;
            std::string u = "https://smmdb.net/api/getcourses";
            if (!q.empty()) u += "?title=" + UrlEnc(q);
            OSD::Notify(Color::Yellow << "Searching...");
            std::string r = HttpGet(u.c_str());
            if (r.empty()) { OSD::Notify(Color::Red << "No response"); return false; }
            Parse(r);
            OSD::Notify(Color::Green << "Found: " << g_levels.size());
            return !g_levels.empty();
        }

        void MSearchName(MenuEntry*) {
            Keyboard k; k.SetHeaderText("Level name:");
            std::string i;
            if (k.Open(i)==0 && !i.empty()) {
                if (Search(i)) OSD::Notify("Use 'View Results'");
            }
        }

        void MSearchOwner(MenuEntry*) {
            Keyboard k; k.SetHeaderText("Author:");
            std::string i;
            if (k.Open(i)==0 && !i.empty()) {
                if (!g_netOk && !InitNet()) return;
                std::string u = "https://smmdb.net/api/getcourses?owner=" + UrlEnc(i);
                OSD::Notify(Color::Yellow << "Searching...");
                std::string r = HttpGet(u.c_str());
                if (!r.empty()) { Parse(r); OSD::Notify(Color::Green << "Found: " << g_levels.size()); }
            }
        }

        void MResults(MenuEntry*) {
            if (g_levels.empty()) { MessageBox("No results!")(); return; }
            std::vector<std::string> it;
            for (auto& l : g_levels) it.push_back(l.name + " [" + std::to_string(l.stars) + "*]");
            Keyboard k; k.SetHeaderText("Select:"); k.Populate(it);
            int s = k.Open();
            if (s>=0 && s<(int)g_levels.size()) {
                auto& l = g_levels[s];
                MessageBox(l.name + "\n\nBy: " + l.owner + "\nID: " + l.id + "\n*: " + std::to_string(l.stars))();
            }
        }

        void MRecent(MenuEntry*) { Search(""); }
        void MTest(MenuEntry*) {
            OSD::Notify(Color::Yellow << "Testing...");
            if (!g_netOk && !InitNet()) return;
            std::string r = HttpGet("https://smmdb.net/api/getcourses?limit=1");
            if (!r.empty()) OSD::Notify(Color::Green << "OK!");
            else OSD::Notify(Color::Red << "Failed");
        }
        void MAbout(MenuEntry*) { MessageBox("MM3DS Level Search v1.0\n\nREAL API!\n\nsmmdb.net/api\n\n- Search by name\n- Search by author\n\nWiFi required!")(); }
        void MInit(MenuEntry*) { OSD::Notify(Color::Green << "MM3DS loaded!"); }

        int main() {
            PluginMenu m("MM3DS Level Search", 1, 0, 0);
            m.SynchronizeWithFrame(true);
            m.Append(new MenuEntry("Search by Name", MSearchName));
            m.Append(new MenuEntry("Search by Author", MSearchOwner));
            m.Append(new MenuEntry("View Results", MResults));
            m.Append(new MenuEntry("Recent Levels", MRecent));
            m.Append(new MenuEntry("Test Connection", MTest));
            m.Append(new MenuEntry("About", MAbout));
            m.OnInitialize = MInit;
            m.Run();
            return 0;
        }
        EOFMAIN

    - name: Fix all includes
      run: |
        cd jisho-3gx
        
        # Fix include paths in all source files
        find . -name "*.hpp" -o -name "*.cpp" | while read f; do
          sed -i 's|<CTRPluginFramework.hpp>|"include/CTRPluginFramework.hpp"|g' "$f" 2>/dev/null || true
          sed -i 's|<CTRPluginFramework/|"include/CTRPluginFramework/|g' "$f" 2>/dev/null || true
        done

    - name: Build
      run: |
        cd jisho-3gx
        export DEVKITPRO=/opt/devkitpro
        export DEVKITARM=/opt/devkitpro/devkitARM
        make clean 2>/dev/null || true
        make 2>&1 | head -50

    - name: Find outputs
      run: |
        cd jisho-3gx
        find . -name "*.3gx" -o -name "*.elf"

    - name: Prepare output
      run: |
        mkdir -p output
        cd jisho-3gx
        f=$(find . -name "*.3gx" | head -1)
        [ -n "$f" ] && cp "$f" ../output/MM3DSSearch.3gx
        echo "Done" > ../output/README.txt
        ls -la ../output/

    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: MM3DSSearch
        path: output/
