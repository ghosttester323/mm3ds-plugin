name: Build MM3DS Plugin

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: devkitpro/devkitarm:latest

    steps:
    - name: Install tools
      run: apt-get update && apt-get install -y zip

    - name: Checkout CTRPluginFramework-BlankTemplate
      uses: actions/checkout@v4
      with:
        repository: PabloMK7/CTRPluginFramework-BlankTemplate
        submodules: true

    - name: Show structure
      run: |
        echo "=== Files ==="
        ls -la
        echo "=== Dirs ==="
        find . -type d | head -20
        echo "=== Sources ==="
        find . -name "*.cpp"

    - name: Create plugin code
      run: |
        # Find the main source file
        MAIN=$(find . -name "main.cpp" | head -1)
        echo "Main: $MAIN"
        
        cat > "$MAIN" << 'EOF'
        #include <CTRPluginFramework.hpp>
        #include <string>
        #include <vector>
        #include <3ds.h>

        using namespace CTRPluginFramework;

        bool g_netOk = false;
        u32* g_socBuf = nullptr;

        bool InitNet() {
            if (g_netOk) return true;
            g_socBuf = (u32*)memalign(0x1000, 0x100000);
            if (!g_socBuf) return false;
            if (R_FAILED(socInit(g_socBuf, 0x100000))) return false;
            if (R_FAILED(httpcInit(0))) { socExit(); return false; }
            g_netOk = true;
            OSD::Notify(Color::Green << "WiFi OK!");
            return true;
        }

        std::string UrlEnc(const std::string& s) {
            std::string o; char h[8];
            for (unsigned char c : s) {
                if (isalnum(c)||c=='-'||c=='_'||c=='.'||c=='~') o+=c;
                else { sprintf(h,"%%%02X",c); o+=h; }
            }
            return o;
        }

        std::string HttpGet(const char* url) {
            httpcContext c;
            if (R_FAILED(httpcOpenContext(&c, HTTPC_METHOD_GET, url, 0))) return "";
            httpcSetSSLOpt(&c, HTTPCOPT_DISABLE_SSLVERIFY);
            httpcAddRequestHeaderField(&c, "User-Agent", "MM3DS/1.0");
            if (R_FAILED(httpcBeginRequest(&c))) { httpcCloseContext(&c); return ""; }
            u32 st=0; httpcGetResponseStatusCode(&c, &st);
            if (st!=200) { httpcCloseContext(&c); return ""; }
            std::string r; u8 b[2048]; u32 n; Result ret;
            do {
                ret = httpcDownloadData(&c, b, sizeof(b), &n);
                if (n>0) r.append((char*)b, n);
            } while (ret == (Result)HTTPC_RESULTCODE_DOWNLOADPENDING);
            httpcCloseContext(&c);
            return r;
        }

        void DoSearch(const std::string& q) {
            if (!g_netOk && !InitNet()) return;
            std::string u = "https://smmdb.net/api/getcourses";
            if (!q.empty()) u += "?title=" + UrlEnc(q);
            OSD::Notify(Color::Yellow << "Searching...");
            std::string r = HttpGet(u.c_str());
            if (r.empty()) { OSD::Notify(Color::Red << "Connection failed"); return; }
            OSD::Notify(Color::Green << "Got: " << r.length() << " bytes");
            // Count results
            int cnt = 0;
            size_t p = 0;
            while ((p = r.find("\"courseid\"", p)) != std::string::npos) { cnt++; p++; }
            OSD::Notify(Color::White << "Found: " << cnt << " levels");
        }

        void MenuSearch(MenuEntry*) {
            Keyboard k; k.SetHeaderText("Enter level name:");
            std::string i;
            if (k.Open(i)==0 && !i.empty()) DoSearch(i);
        }

        void MenuAuthor(MenuEntry*) {
            Keyboard k; k.SetHeaderText("Enter author:");
            std::string i;
            if (k.Open(i)==0 && !i.empty()) {
                if (!g_netOk && !InitNet()) return;
                std::string u = "https://smmdb.net/api/getcourses?owner=" + UrlEnc(i);
                OSD::Notify(Color::Yellow << "Searching...");
                std::string r = HttpGet(u.c_str());
                if (!r.empty()) {
                    int cnt = 0; size_t p = 0;
                    while ((p = r.find("\"courseid\"", p)) != std::string::npos) { cnt++; p++; }
                    OSD::Notify(Color::Green << "Found: " << cnt << " levels");
                }
            }
        }

        void MenuTest(MenuEntry*) {
            if (!g_netOk && !InitNet()) return;
            OSD::Notify(Color::Yellow << "Testing SMMDB...");
            std::string r = HttpGet("https://smmdb.net/api/getcourses?limit=1");
            if (!r.empty()) OSD::Notify(Color::Green << "SMMDB OK!");
            else OSD::Notify(Color::Red << "Failed!");
        }

        void MenuAbout(MenuEntry*) {
            MessageBox("MM3DS Level Search v1.0\n\n"
                      "REAL SMMDB API!\n\n"
                      "Features:\n"
                      "- Search by name\n"
                      "- Search by author\n"
                      "- Test connection\n\n"
                      "WiFi required!\n"
                      "Works with Pretendo!")();
        }

        void MenuInit(MenuEntry*) {
            OSD::Notify(Color::Green << "MM3DS Level Search loaded!");
            OSD::Notify(Color::Cyan << "Press SELECT");
        }

        int main() {
            PluginMenu m("MM3DS Level Search", 1, 0, 0);
            m.SynchronizeWithFrame(true);
            m.Append(new MenuEntry("Search by Name", MenuSearch, "Search levels"));
            m.Append(new MenuEntry("Search by Author", MenuAuthor, "Find by creator"));
            m.Append(new MenuEntry("Test Connection", MenuTest, "Check SMMDB"));
            m.Append(new MenuEntry("About", MenuAbout));
            m.OnInitialize = MenuInit;
            m.Run();
            return 0;
        }
        EOF
        
        echo "Written to $MAIN"

    - name: Build
      run: |
        export DEVKITPRO=/opt/devkitpro
        export DEVKITARM=/opt/devkitpro/devkitARM
        make clean 2>/dev/null || true
        make 2>&1 | tail -30

    - name: Find output
      run: |
        find . -name "*.3gx"
        find . -name "*.elf"

    - name: Prepare artifact
      run: |
        mkdir -p output
        f=$(find . -name "*.3gx" | head -1)
        if [ -n "$f" ]; then
          cp "$f" output/MM3DSSearch.3gx
          echo "BUILD SUCCESS!"
        fi
        
        cat > output/README.txt << 'EOF'
        MM3DS LEVEL SEARCH v1.0
        ======================
        
        INSTALLATION:
        1. Copy MM3DSSearch.3gx to your SD card:
           EUR: /luma/plugins/0004000000165800/
           USA: /luma/plugins/0004000000164800/
           JPN: /luma/plugins/0004000000164400/
        
        2. Enable plugins in Luma3DS (hold SELECT on boot)
        3. Launch Mario Maker 3DS
        4. Press SELECT in-game
        
        FEATURES:
        - Search by Name (connects to SMMDB!)
        - Search by Author
        - Test Connection
        
        Requires WiFi + Pretendo Network!
        API: smmdb.net/api
        EOF
        
        ls -la output/

    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: MM3DSSearch-Plugin
        path: output/
