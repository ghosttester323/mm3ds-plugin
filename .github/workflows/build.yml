name: Build MM3DS Plugin

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: devkitpro/devkitarm:latest

    steps:
    - name: Install tools
      run: |
        apt-get update && apt-get install -y git zip wget

    - name: Download 3gxtool
      run: |
        # Download prebuilt 3gxtool
        wget -q https://github.com/Nanquitas/3gxtool/releases/download/v2.0/3gxtool-linux-x86_64 -O /usr/local/bin/3gxtool || \
        wget -q https://github.com/Nanquitas/3gxtool/releases/download/v1.0/3gxtool-linux -O /usr/local/bin/3gxtool || \
        echo "Could not download 3gxtool, will try without"
        chmod +x /usr/local/bin/3gxtool 2>/dev/null || true

    - name: Clone jisho-3gx
      run: |
        git clone --recursive https://github.com/mortenson/jisho-3gx.git
        cd jisho-3gx
        git submodule update --init --recursive
        ls -la
        ls -la lib/ 2>/dev/null || echo "No lib"

    - name: Check structure
      run: |
        cd jisho-3gx
        cat Makefile
        echo "---"
        ls -la include/CTRPluginFramework/ 2>/dev/null || echo "No CTRPF includes"

    - name: Build
      run: |
        cd jisho-3gx
        export DEVKITPRO=/opt/devkitpro
        export DEVKITARM=/opt/devkitpro/devkitARM
        make clean 2>/dev/null || true
        make 2>&1 | head -100
        echo "---"
        ls -la *.3gx 2>/dev/null || find . -name "*.3gx"

    - name: Prepare output
      run: |
        mkdir -p output
        cd jisho-3gx
        
        # Find any 3gx file
        found=$(find . -name "*.3gx" | head -1)
        if [ -n "$found" ]; then
          cp "$found" ../output/MM3DSSearch.3gx
          echo "Built successfully!"
        else
          # Check for ELF that could be converted
          elf=$(find . -name "*.elf" | head -1)
          if [ -n "$elf" ]; then
            echo "Found ELF: $elf"
            3gxtool "$elf" ../output/MM3DSSearch.3gx 2>&1 || echo "3gxtool failed"
          fi
        fi
        
        ls -la ../output/

    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: MM3DSSearch-plugin
        path: output/
